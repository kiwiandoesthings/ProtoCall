<!DOCTYPE html>
<html>
	<head>
		<link rel="icon" type="image/ico" sizes="16x16" href="resources/pc_logo.ico">
		<title>ProtoCall Chatting - Register</title>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<nav>
			<div id="nav-left">
				<a href="home.html">Home</a>
			</div>
			
			<div id="nav-right">
				<a href="chat.html">Chat</a>
				<a href="account.html">Account</a>
			</div>
		</nav>

		<main id="page-heading">
			<h1>Register</h1>
			<h2 id="userInfo"></h2>

			<div class="small-form">
				<form autocomplete="dont-do-it">
					<input type="text" id="username" placeholder="Chose a username" maxlength="18" autocomplete="dont-do-it"/><br>
					<input type="text" id="password" placeholder="Chose a password" maxlength="24" autocomplete="dont-do-it"/><br>
					<input style="width: 5%" id="color" type="color" value="#ffffff" autocomplete="dont-do-it"/>
					<label id="colorlabel" for="color" style="background-color: black;" autocomplete="dont-do-it">Your text color. Please prefer high-contrast colors.</label><br>
					<input type="file" id="profile-picture-input" accept="image/png, image/jpeg, image/gif">
  					<button id="submit" onclick="register()" autocomplete="dont-do-it" type="button">Register</button>
				</form>
			</div>
			<a href="login.html">Already registered?</a>
		</main>

		<footer>
			<a href="https://kiwiandoesthings.place">My Website</a>
		</footer>

  		<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
		<script src="common.js"></script>
  		<script src="user.js"></script>
	</body>
</html>
